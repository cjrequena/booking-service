openapi: 3.0.3
info:
  title: Booking Command Handler API
  description: >-
    Command-side API for the booking aggregate (CQRS / Event Sourcing).
    All operations require the `Accept-Version` header and are versioned via a
    vendor media type.
  version: 1.0.0
  contact:
    name: Carlos Requena
    email: cjrequena001+git@email.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8080
    description: Local development server

tags:
  - name: Booking Command API
    description: Command operations for booking aggregate management

paths:

  /command-handler/api/bookings/create:
    post:
      tags: [Booking Command API]
      summary: Create a booking
      description: Creates a new booking aggregate.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingCommand'
      responses:
        '201':
          description: Booking successfully created
          headers:
            Booking-Id:
              description: Identifier of the created booking aggregate
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /command-handler/api/bookings/{bookingId}/confirm:
    post:
      tags: [Booking Command API]
      summary: Confirm a booking
      description: Confirms a booking, transitioning it to CONFIRMED status.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          $ref: '#/components/responses/CommandOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /command-handler/api/bookings/{bookingId}/cancel:
    post:
      tags: [Booking Command API]
      summary: Cancel a booking
      description: Cancels a booking, transitioning it to CANCELLED status.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          $ref: '#/components/responses/CommandOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /command-handler/api/bookings/{bookingId}/complete:
    post:
      tags: [Booking Command API]
      summary: Complete a booking
      description: Completes a booking, transitioning it to COMPLETED status.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          $ref: '#/components/responses/CommandOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
        '501':
          $ref: '#/components/responses/NotImplemented'

  /command-handler/api/bookings/{bookingId}/expire:
    post:
      tags: [Booking Command API]
      summary: Expire a booking
      description: Expires a booking, transitioning it to EXPIRED status.
      parameters:
        - $ref: '#/components/parameters/AcceptVersion'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          $ref: '#/components/responses/CommandOk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
        '501':
          $ref: '#/components/responses/NotImplemented'

components:

  parameters:
    AcceptVersion:
      name: Accept-Version
      in: header
      required: true
      schema:
        type: string
        enum:
          - application/vnd.booking-command-handler.v1
      example: application/vnd.booking-command-handler.v1

    BookingId:
      name: bookingId
      in: path
      required: true
      description: Unique identifier of the booking aggregate
      schema:
        type: string
        format: uuid
      example: 123e4567-e89b-12d3-a456-426614174000

  responses:
    CommandOk:
      description: Command executed successfully
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CommandResponse'
    BadRequest:
      description: Invalid request data or business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Booking not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Optimistic concurrency conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotImplemented:
      description: Command handler not implemented
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    CreateBookingCommand:
      type: object
      required: [paxes, lead_pax_id, products]
      properties:
        paxes:
          type: array
          minItems: 1
          description: Passengers on the booking
          items:
            $ref: '#/components/schemas/Pax'
        lead_pax_id:
          type: string
          format: uuid
          description: Identifier of the lead passenger
        products:
          type: array
          minItems: 1
          description: Booked products (Hotel, Transfer, ...)
          items:
            $ref: '#/components/schemas/Product'
        metadata:
          type: object
          additionalProperties: true
          description: Custom metadata as key-value pairs

    Pax:
      type: object
      description: Passenger value object
      additionalProperties: true
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string

    Product:
      type: object
      description: Product value object (Hotel or Transfer)
      additionalProperties: true
      properties:
        product_type:
          type: string
          enum: [Hotel, Transfer]

    CommandResponse:
      type: object
      properties:
        booking_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/BookingStatus'

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error_code:
          type: string
        message:
          type: string
        validation_errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string
        rejected_value: {}

    BookingStatus:
      type: string
      enum:
        - CREATED
        - PROCESSING
        - CONFIRMED
        - PARTIALLY_CONFIRMED
        - CANCELLED
        - COMPLETED
        - EXPIRED
